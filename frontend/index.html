<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobBoard — Find Your Next Role</title>
    <meta name="description" content="Discover top engineering and tech jobs from Indonesia's leading companies. Built & deployed on Azure AKS." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0a0a0f;
        --surface: #111118;
        --surface2: #1a1a24;
        --border: rgba(255,255,255,0.07);
        --accent: #6c63ff;
        --accent2: #a78bfa;
        --text: #e8e8f0;
        --muted: #6b6b80;
        --green: #34d399;
        --orange: #fb923c;
      }

      html { scroll-behavior: smooth; }

      body {
        font-family: 'Inter', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      /* ── NOISE GRAIN OVERLAY ── */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }

      /* ── GLOW ORBS ── */
      .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.12;
        pointer-events: none;
        z-index: 0;
      }
      .orb-1 { width: 600px; height: 600px; background: #6c63ff; top: -200px; left: -100px; }
      .orb-2 { width: 400px; height: 400px; background: #a78bfa; bottom: -100px; right: -50px; }

      /* ── NAV ── */
      nav {
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        background: rgba(10,10,15,0.8);
        border-bottom: 1px solid var(--border);
        padding: 0 2rem;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .nav-logo {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 1.2rem;
        background: linear-gradient(135deg, #6c63ff, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.5px;
      }

      .nav-badge {
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--green);
        background: rgba(52, 211, 153, 0.1);
        border: 1px solid rgba(52, 211, 153, 0.25);
        border-radius: 999px;
        padding: 4px 10px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      /* ── HERO ── */
      .hero {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 5rem 2rem 3rem;
        text-align: center;
      }

      .hero-eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--accent2);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 1.5rem;
      }

      .hero-eyebrow::before {
        content: '';
        width: 24px;
        height: 1px;
        background: var(--accent2);
      }

      .hero-eyebrow::after {
        content: '';
        width: 24px;
        height: 1px;
        background: var(--accent2);
      }

      h1 {
        font-family: 'Syne', sans-serif;
        font-size: clamp(2.8rem, 6vw, 5rem);
        font-weight: 800;
        line-height: 1.05;
        letter-spacing: -2px;
        margin-bottom: 1.25rem;
        background: linear-gradient(160deg, #ffffff 0%, #a0a0c0 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .hero-sub {
        font-size: 1.05rem;
        color: var(--muted);
        max-width: 500px;
        margin: 0 auto 2.5rem;
        line-height: 1.7;
      }

      /* ── SEARCH BAR ── */
      .search-wrap {
        display: flex;
        align-items: center;
        gap: 0;
        max-width: 560px;
        margin: 0 auto;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      .search-wrap:focus-within {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
      }

      .search-wrap input {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        padding: 0.9rem 1.25rem;
        font-size: 0.9rem;
        color: var(--text);
        font-family: inherit;
      }

      .search-wrap input::placeholder { color: var(--muted); }

      .search-btn {
        background: var(--accent);
        color: #fff;
        border: none;
        cursor: pointer;
        padding: 0.9rem 1.5rem;
        font-size: 0.85rem;
        font-weight: 600;
        font-family: inherit;
        transition: background 0.2s;
        white-space: nowrap;
      }

      .search-btn:hover { background: #7c74ff; }

      /* ── FILTER TABS ── */
      .filters {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 0 2rem 1.5rem;
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .filter-btn {
        background: var(--surface);
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 0.45rem 1.1rem;
        font-size: 0.8rem;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.2s;
      }

      .filter-btn:hover { border-color: var(--accent); color: var(--accent2); }

      .filter-btn.active {
        background: rgba(108,99,255,0.15);
        border-color: var(--accent);
        color: var(--accent2);
      }

      /* ── META BAR ── */
      .meta-bar {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 0 2rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .meta-count { font-size: 0.85rem; color: var(--muted); }
      .meta-count span { color: var(--text); font-weight: 600; }

      .developer-tag {
        font-size: 0.75rem;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .developer-tag strong { color: var(--accent2); }

      /* ── GRID ── */
      .jobs-grid {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 0 2rem 6rem;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
        gap: 1rem;
      }

      /* ── JOB CARD ── */
      .job-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1.5rem;
        cursor: pointer;
        transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), border-color 0.25s, box-shadow 0.25s;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        animation: fadeUp 0.4s ease both;
      }

      .job-card:hover {
        transform: translateY(-4px);
        border-color: rgba(108,99,255,0.4);
        box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(108,99,255,0.15);
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }

      .company-logo {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 1.1rem;
        flex-shrink: 0;
        color: white;
      }

      .job-type-badge {
        font-size: 0.7rem;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 999px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }

      .badge-fulltime { background: rgba(52,211,153,0.1); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
      .badge-contract { background: rgba(251,146,60,0.1); color: var(--orange); border: 1px solid rgba(251,146,60,0.2); }

      .job-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--text);
        letter-spacing: -0.3px;
        line-height: 1.3;
      }

      .job-company {
        font-size: 0.82rem;
        color: var(--muted);
        margin-top: 2px;
      }

      .card-meta {
        display: flex;
        align-items: center;
        gap: 1rem;
        font-size: 0.78rem;
        color: var(--muted);
      }

      .card-meta-item { display: flex; align-items: center; gap: 4px; }

      .card-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }

      .tag {
        font-size: 0.72rem;
        font-weight: 500;
        color: var(--accent2);
        background: rgba(108,99,255,0.1);
        border: 1px solid rgba(108,99,255,0.15);
        border-radius: 6px;
        padding: 3px 8px;
      }

      .card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: 0.75rem;
        border-top: 1px solid var(--border);
      }

      .salary {
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--text);
      }

      .posted-time {
        font-size: 0.75rem;
        color: var(--muted);
      }

      /* ── LOADING & EMPTY ── */
      .skeleton {
        background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 8px;
      }

      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 4rem 2rem;
        color: var(--muted);
      }

      .empty-state svg { margin-bottom: 1rem; opacity: 0.4; }

      /* ── FOOTER ── */
      footer {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 2rem;
        font-size: 0.75rem;
        color: var(--muted);
        border-top: 1px solid var(--border);
      }

      footer a { color: var(--accent2); text-decoration: none; }

      @media (max-width: 600px) {
        .jobs-grid { grid-template-columns: 1fr; }
        h1 { font-size: 2.4rem; letter-spacing: -1px; }
      }
    </style>
  </head>
  <body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <nav>
      <span class="nav-logo">JobBoard.</span>
    </nav>

    <section class="hero">
      <h1>Find Your<br/>Dream Role.</h1>
      <p class="hero-sub">Curated tech jobs from Indonesia's top companies. Real listings, real impact.</p>
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Search job title, company, or skill…" />
        <button class="search-btn" onclick="applySearch()" id="search-btn-el">Search</button>
      </div>
    </section>

    <div class="filters">
      <button class="filter-btn active" id="filter-all" onclick="filterJobs('all')">All Jobs</button>
      <button class="filter-btn" id="filter-fulltime" onclick="filterJobs('Full-time')">Full-time</button>
      <button class="filter-btn" id="filter-contract" onclick="filterJobs('Contract')">Contract</button>
    </div>

    <div class="meta-bar">
      <p class="meta-count"><span id="job-count">—</span> positions available</p>
      <p class="developer-tag" id="developer-info">Loading…</p>
    </div>

    <main class="jobs-grid" id="jobs-grid" role="list" aria-label="Job listings">
      <!-- Populated by JS -->
    </main>


    <script>
      const API = '/api';
      let allJobs = [];
      let activeFilter = 'all';
      let searchQuery = '';

      // Colour map per first letter of company
      const gradients = [
        'linear-gradient(135deg,#6c63ff,#a78bfa)',
        'linear-gradient(135deg,#34d399,#059669)',
        'linear-gradient(135deg,#fb923c,#ea580c)',
        'linear-gradient(135deg,#60a5fa,#2563eb)',
        'linear-gradient(135deg,#f472b6,#db2777)',
        'linear-gradient(135deg,#facc15,#d97706)',
      ];

      function getGradient(name) {
        const idx = name.charCodeAt(0) % gradients.length;
        return gradients[idx];
      }

      function getBadgeClass(type) {
        return type === 'Full-time' ? 'badge-fulltime' : 'badge-contract';
      }

      function renderCard(job, delay) {
        return `
          <article class="job-card" style="animation-delay:${delay}ms" role="listitem">
            <div class="card-header">
              <div>
                <div class="job-title">${job.title}</div>
                <div class="job-company">${job.company}</div>
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0">
                <div class="company-logo" style="background:${getGradient(job.company)}">${job.company[0]}</div>
                <span class="job-type-badge ${getBadgeClass(job.type)}">${job.type}</span>
              </div>
            </div>

            <div class="card-meta">
              <span class="card-meta-item">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                ${job.location}
              </span>
              <span class="card-meta-item">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                ${job.posted}
              </span>
            </div>

            <div class="card-tags">
              ${job.tags.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>

            <div class="card-footer">
              <span class="salary">${job.salary}</span>
              <span class="posted-time">${job.type}</span>
            </div>
          </article>
        `;
      }

      function renderJobs(jobs) {
        const grid = document.getElementById('jobs-grid');
        document.getElementById('job-count').textContent = jobs.length;

        if (jobs.length === 0) {
          grid.innerHTML = `
            <div class="empty-state">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <p>No jobs found matching your criteria.</p>
            </div>`;
          return;
        }

        grid.innerHTML = jobs.map((job, i) => renderCard(job, i * 60)).join('');
      }

      function applyFilters() {
        let result = allJobs;
        if (activeFilter !== 'all') {
          result = result.filter(j => j.type === activeFilter);
        }
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          result = result.filter(j =>
            j.title.toLowerCase().includes(q) ||
            j.company.toLowerCase().includes(q) ||
            j.tags.some(t => t.toLowerCase().includes(q))
          );
        }
        renderJobs(result);
      }

      function filterJobs(type) {
        activeFilter = type;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        const idMap = { 'all': 'filter-all', 'Full-time': 'filter-fulltime', 'Contract': 'filter-contract' };
        document.getElementById(idMap[type]).classList.add('active');
        applyFilters();
      }

      function applySearch() {
        searchQuery = document.getElementById('search-input').value.trim();
        applyFilters();
      }

      document.getElementById('search-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') applySearch();
      });

      // Load developer info
      fetch(`${API}/info`)
        .then(r => r.json())
        .then(data => {
          document.getElementById('developer-info').innerHTML =
            `Developed by <strong>${data.developer}</strong> &bull; <strong>${data.nim}</strong>`;
        })
        .catch(() => {
          document.getElementById('developer-info').textContent = 'Could not load developer info.';
        });

      // Load jobs
      fetch(`${API}/jobs`)
        .then(r => r.json())
        .then(data => {
          allJobs = data;
          renderJobs(data);
        })
        .catch(() => {
          document.getElementById('jobs-grid').innerHTML = `
            <div class="empty-state">
              <p>Failed to load jobs. Please refresh.</p>
            </div>`;
        });
    </script>
  </body>
</html>
