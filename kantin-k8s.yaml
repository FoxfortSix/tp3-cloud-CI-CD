apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-kantin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend-api
        # GANTI 'username' dengan username Docker Hub Anda
        image: backend-kantin:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000

        # BAGIAN IDENTITY INJECTION[cite: 2]
        env:
          - name: USER_NAME
            value: "Mochamad Azka Basria"
          - name: USER_NIM
            value: "1234567"


---

apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
  type: ClusterIP

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-kantin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-ui
        # GANTI 'username' dengan username Docker Hub Anda
        image: frontend-kantin:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80


---

apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP